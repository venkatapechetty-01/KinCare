version: '3.9'
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kincare_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kincare_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/KinCare.API/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=kincare_dev;Username=postgres;Password=postgres"
    restart: unless-stopped
    networks:
      - kincare-net

  web:
    build:
      context: ./src/KinCare.Web
      dockerfile: Dockerfile.dev
    depends_on:
      - api
    ports:
      - '4200:4200'
    environment:
      NODE_ENV: development
    restart: unless-stopped
    networks:
      - kincare-net

volumes:
  pgdata:

networks:
  kincare-net:
    driver: bridge
