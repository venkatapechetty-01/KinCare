services:
  - type: web
    name: kincare-api
    env: dotnet
    plan: free
    rootDir: src/KinCare.API
    buildCommand: dotnet publish -c Release
    startCommand: dotnet ./bin/Release/net9.0/publish/KinCare.API.dll --urls http://0.0.0.0:$PORT
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: KINCARE_DB_CONNECTION_STRING
        fromDatabase:
          name: kincare-db
          property: connectionString
      - key: KINCARE_JWT_SECRET_KEY
        generateValue: true
      - key: KINCARE_APP_BASE_URL
        value: https://kincare-web.onrender.com
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SPLUNK_HEC_URL
        sync: false
      - key: SPLUNK_HEC_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_STARTER_PRICE_ID
        sync: false
      - key: STRIPE_PROFESSIONAL_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_PRICE_ID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: FIREBASE_CREDENTIAL_PATH
        sync: false
      - key: ROUNDTRIP_API_KEY
        sync: false
      - key: ROUNDTRIP_CLIENT_ID
        sync: false
      - key: ROUNDTRIP_CLIENT_SECRET
        sync: false
      - key: ROUNDTRIP_ORGANIZATION_ID
        sync: false
      - key: ROUNDTRIP_WEBHOOK_SECRET
        sync: false

  - type: static_site
    name: kincare-web
    plan: free
    rootDir: src/KinCare.Web
    buildCommand: npm install && npm run build
    staticPublishPath: dist/kin-care.web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_BASE_URL
        value: https://kincare-api.onrender.com

databases:
  - name: kincare-db
    databaseName: kincare
    user: kincare
    plan: free
